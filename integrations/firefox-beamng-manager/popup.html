<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BeamNG-Manager Bridge</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 10px;
        width: 260px;
      }
      .row {
        margin-bottom: 8px;
      }
      input {
        width: 110px;
        padding: 4px 6px;
      }
      button {
        padding: 4px 8px;
      }
      #status {
        margin-top: 6px;
        font-size: 12px;
        color: #2b7a2b;
        min-height: 16px;
      }
      #lastCommand {
        margin-top: 6px;
        font-size: 11px;
        color: #444;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="row"><strong>BeamNG-Manager Bridge</strong></div>
    <div class="row">
      <label for="bridgePort">Port:</label>
      <input id="bridgePort" type="number" min="1024" max="65535" />
      <button id="saveBtn" type="button">Save</button>
    </div>
    <div class="row">
      <label for="bridgePollSeconds">Poll (s):</label>
      <input id="bridgePollSeconds" type="number" min="4" max="60" />
    </div>
    <div class="row">
      <button id="reconnectBtn" type="button">Reconnect bridge</button>
    </div>
    <div class="row">
      <button id="optionsBtn" type="button">Open Options</button>
    </div>
    <div id="status"></div>
    <div id="lastCommand"></div>
    <script src="popup.js"></script>
  </body>
</html>
